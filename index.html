<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音输入（稳定版+错误提示）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    /* 错误提示条 */
    #errorTip {
      display: none;
      background: #f44336;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .input-box {
      position: relative;
      width: 100%;
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      height: 96px;
      padding: 14px 70px 14px 50px;
      border-radius: 24px;
      border: 1px solid #A125FC;
      font-size: 14px;
      resize: none;
      outline: none;
      background: #fff;
    }

    /* 语音按钮 */
    .voice-btn {
      position: absolute;
      left: 12px;
      bottom: 14px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #f1f1f1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* 录音中按钮 */
    .recording {
      background: #db4dff !important;
    }

    /* 发送按钮 */
    .send-btn {
      position: absolute;
      right: 12px;
      bottom: 14px;
      width: 80px;
      height: 48px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(90deg, #ffeee0 0%, #e6c4ff 100%);
      cursor: pointer;
      font-size: 14px;
    }

    /* 声波动画 */
    .wave {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 18px;
    }

    .wave span {
      width: 2px;
      background: #fff;
      border-radius: 1px;
      animation: wave 1s infinite ease-in-out;
    }

    .wave span:nth-child(1) { height: 6px; animation-delay: 0s }
    .wave span:nth-child(2) { height: 9px; animation-delay: 0.2s }
    .wave span:nth-child(3) { height: 12px; animation-delay: 0.4s }
    .wave span:nth-child(4) { height: 9px; animation-delay: 0.6s }
    .wave span:nth-child(5) { height: 6px; animation-delay: 0.8s }

    @keyframes wave {
      0%,100% { transform: scaleY(0.7); }
      50% { transform: scaleY(1.3); }
    }

    /* 加载中 */
    .loading {
      width: 18px;
      height: 18px;
      border: 2px solid #ccc;
      border-top: 2px solid #666;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* 麦克风图标 */
    .mic-icon {
      width: 18px;
      height: 18px;
    }
  </style>
</head>

<body>
  <!-- 错误提示条 -->
  <div id="errorTip"></div>

  <div class="input-box">
    <textarea id="msgInput" placeholder="How can I help you?"></textarea>

    <button id="voiceBtn" class="voice-btn">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 2c1.1 0 2 .9 2 2v7c0 1.1-.9 2-2 2s-2-.9-2-2V4c0-1.1.9-2 2-2zm0 18c-2.2 0-4-1.8-4-4H8c0 2.2 1.8 4 4 4s4-1.8 4-4h2c0 3.3-2.7 6-6 6z"/>
      </svg>
    </button>

    <button id="sendBtn" class="send-btn">发送</button>
  </div>

  <script>
    const msgInput = document.getElementById('msgInput');
    const voiceBtn = document.getElementById('voiceBtn');
    const sendBtn = document.getElementById('sendBtn');
    const errorTip = document.getElementById('errorTip');

    // 状态
    let isVoiceLoading = false;
    let isRecording = false;
    let recognition = null;
    let finalResult = '';

    // 显示错误
    function showError(msg) {
      errorTip.textContent = '错误：' + msg;
      errorTip.style.display = 'block';
      setTimeout(() => {
        errorTip.style.display = 'none';
      }, 4000);
    }

    // 获取语音识别对象
    function getSpeechRecognition() {
      return window.SpeechRecognition || window.webkitSpeechRecognition || null;
    }

    // 点击录音
    voiceBtn.onclick = () => {
      if (isVoiceLoading) return;
      if (!isRecording) startRecord();
      else stopRecord();
    };

    // 开始录音
    function startRecord() {
      if (isRecording) return;

      isVoiceLoading = true;
      isRecording = false;
      finalResult = '';
      msgInput.value = '';
      voiceBtn.innerHTML = '<div class="loading"></div>';

      const SpeechRecognition = getSpeechRecognition();
      if (!SpeechRecognition) {
        showError('当前环境不支持语音识别（微信/浏览器不兼容）');
        resetVoice();
        return;
      }

      try {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = () => {
          isVoiceLoading = false;
          isRecording = true;
          voiceBtn.classList.add('recording');
          voiceBtn.innerHTML = `
            <div class="wave">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          `;
        };

        recognition.onresult = (e) => {
          let temp = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const text = e.results[i][0].transcript;
            if (e.results[i].isFinal) finalResult += text + ' ';
            else temp = text;
          }
          msgInput.value = (finalResult + ' ' + temp).trim();
        };

        // 自动重启（防止微信自动停止）
        recognition.onend = () => {
          if (isRecording && recognition) recognition.start();
        };

        recognition.onerror = (e) => {
          showError('语音失败：' + (e.error || '未知错误'));
          resetVoice();
        };

        recognition.start();
      } catch (err) {
        showError('启动录音失败：' + err.message);
        resetVoice();
      }
    }

    // 停止录音
    function stopRecord() {
      isRecording = false;
      isVoiceLoading = false;
      if (recognition) {
        recognition.stop();
        recognition = null;
      }
      msgInput.value = finalResult.trim();
      voiceBtn.classList.remove('recording');
      voiceBtn.innerHTML = `<svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2v7c0 1.1-.9 2-2 2s-2-.9-2-2V4c0-1.1.9-2 2-2zm0 18c-2.2 0-4-1.8-4-4H8c0 2.2 1.8 4 4 4s4-1.8 4-4h2c0 3.3-2.7 6-6 6z"/></svg>`;
    }

    // 重置状态
    function resetVoice() {
      isVoiceLoading = false;
      isRecording = false;
      if (recognition) {
        recognition.stop();
        recognition = null;
      }
      voiceBtn.classList.remove('recording');
      voiceBtn.innerHTML = `<svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2v7c0 1.1-.9 2-2 2s-2-.9-2-2V4c0-1.1.9-2 2-2zm0 18c-2.2 0-4-1.8-4-4H8c0 2.2 1.8 4 4 4s4-1.8 4-4h2c0 3.3-2.7 6-6 6z"/></svg>`;
    }

    // 发送
    sendBtn.onclick = () => {
      const text = msgInput.value.trim();
      if (!text) return;
      alert('发送：' + text);
      msgInput.value = '';
    };

    // 回车发送
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });
  </script>
</body>
</html>
