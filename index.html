<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>微信语音输入测试</title>
<style>
  * {
    margin:0; padding:0; box-sizing:border-box;
  }
  body {
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
  }
  .input-wrapper {
    position: relative;
    width: 100%;
    margin-top: 20px;
  }
  #msgInput {
    width: 100%;
    height: 96px;
    border-radius: 24px;
    border: 1px solid #A125FC;
    padding: 16px 80px 16px 56px;
    font-size: 16px;
    resize: none;
    outline: none;
    background: #fff;
  }
  .voice-btn {
    position: absolute;
    left: 12px;
    bottom: 24px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .recording {
    background: #db4dff !important;
  }
  .send-btn {
    position: absolute;
    right: 12px;
    bottom: 24px;
    width: 80px;
    height: 48px;
    border-radius: 24px;
    border: none;
    background: linear-gradient(90deg, #ffeee0, #e6c4ff);
    font-size: 14px;
  }

  /* 声波动画 */
  .wave {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 18px;
  }
  .wave span {
    width: 2px;
    background: #fff;
    border-radius: 1px;
    animation: wave 1s infinite ease-in-out;
  }
  .wave span:nth-child(1){height:6px;animation-delay:0s}
  .wave span:nth-child(2){height:9px;animation-delay:.2s}
  .wave span:nth-child(3){height:12px;animation-delay:.4s}
  .wave span:nth-child(4){height:9px;animation-delay:.6s}
  .wave span:nth-child(5){height:6px;animation-delay:.8s}
  @keyframes wave{
    0%,100%{transform:scaleY(.7)}
    50%{transform:scaleY(1.3)}
  }

  /* 加载圈 */
  .loading {
    width: 18px;
    height: 18px;
    border: 2px solid #ccc;
    border-top: 2px solid #666;
    border-radius: 50%;
    animation: spin 1s infinite linear;
  }
  @keyframes spin{
    100%{transform:rotate(360deg)}
  }

  /* 麦克风图标 */
  .mic-icon {
    width: 20px;
    height: 20px;
  }
</style>
</head>

<body>
  <div class="input-wrapper">
    <textarea id="msgInput" placeholder="按住说话，松开识别..."></textarea>
    <button id="voiceBtn" class="voice-btn">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 2c1.1 0 2 .9 2 2v7c0 1.1-.9 2-2 2s-2-.9-2-2V4c0-1.1.9-2 2-2zm0 18c-2.2 0-4-1.8-4-4H8c0 2.2 1.8 4 4 4s4-1.8 4-4h2c0 3.3-2.7 6-6 6z"/>
      </svg>
    </button>
    <button id="sendBtn" class="send-btn">发送</button>
  </div>

<script>
const msgInput = document.getElementById('msgInput');
const voiceBtn = document.getElementById('voiceBtn');
const sendBtn = document.getElementById('sendBtn');

let isRecording = false;
let recognition = null;
let resultText = '';

// 微信专用：必须单次识别，不能continuous
function getRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('当前环境不支持语音识别');
    return null;
  }
  const rec = new SpeechRecognition();
  rec.lang = 'zh-CN';
  rec.continuous = false;    // 微信必须关
  rec.interimResults = true;
  return rec;
}

// 开始录音（按住）
function startRecord() {
  if (isRecording) return;
  isRecording = true;
  resultText = '';
  msgInput.value = '';

  voiceBtn.innerHTML = '<div class="loading"></div>';
  voiceBtn.classList.add('recording');

  try {
    recognition = getRecognition();
    if (!recognition) throw new Error('不支持');

    recognition.onstart = () => {
      voiceBtn.innerHTML = `
        <div class="wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      `;
    };

    recognition.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          resultText = e.results[i][0].transcript;
          msgInput.value = resultText.trim();
        }
      }
    };

    recognition.onend = () => {
      stopRecord();
    };

    recognition.onerror = (err) => {
      console.error(err);
      stopRecord();
    };

    recognition.start();
  } catch (e) {
    stopRecord();
  }
}

// 停止录音（松开）
function stopRecord() {
  isRecording = false;
  if (recognition) {
    recognition.stop();
    recognition = null;
  }
  voiceBtn.classList.remove('recording');
  voiceBtn.innerHTML = `<svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2v7c0 1.1-.9 2-2 2s-2-.9-2-2V4c0-1.1.9-2 2-2zm0 18c-2.2 0-4-1.8-4-4H8c0 2.2 1.8 4 4 4s4-1.8 4-4h2c0 3.3-2.7 6-6 6z"/></svg>`;
}

// 微信必须用 touch 事件
voiceBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  startRecord();
});
voiceBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  stopRecord();
});

sendBtn.onclick = () => {
  const t = msgInput.value.trim();
  if(t) {
    alert('发送：' + t);
    msgInput.value = '';
  }
};

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});
</script>
</body>
</html>
