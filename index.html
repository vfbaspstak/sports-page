<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS回放有声音 MP3语音转文字工具</title>
    <!-- 引入MP3编码库 -->
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        body {
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            flex: 1;
            min-width: 100px;
        }

        #startBtn {
            background-color: #42b983;
        }

        #startBtn:disabled {
            background-color: #e53935;
        }

        #stopBtn {
            background-color: #e53935;
        }

        #saveBtn {
            background-color: #2196f3;
        }

        button:disabled {
            background-color: #ccc;
        }

        .status {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-align: center;
        }

        .result {
            padding: 15px;
            background-color: #f8f8f8;
            border-radius: 8px;
            min-height: 150px;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .audio-section {
            display: none;
            margin-top: 20px;
        }

        /* 自定义播放按钮，确保是用户直接交互 */
        #playBtn {
            background-color: #2196f3;
            margin-bottom: 10px;
            width: 100%;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status" id="statusText">点击「开始」启动</div>

        <div class="btn-group">
            <button id="startBtn">开始</button>
            <button id="stopBtn" disabled>停止</button>
            <button id="saveBtn" disabled>保存MP3</button>
        </div>

        <div class="result" id="resultText">请说话...</div>

        <div class="audio-section" id="audioSection">
            <div style="font-size: 14px; color: #333; margin-bottom: 10px;">录音回放：</div>
            <!-- 核心修复：自定义播放按钮，确保在用户交互内处理播放 -->
            <button id="playBtn">▶️ 点击播放录音</button>
            <!-- 原生audio标签，仅作为备用 -->
            <audio id="audioPlayer" controls playsinline hidden>
        </div>
    </div>

    <script>
        // ========== 全局变量 ==========
        let recognition = null;
        let audioContext = null;
        let audioInput = null;
        let recorderNode = null;
        let mp3Encoder = null;
        let audioStream = null;
        let isRecording = false;

        // ========== 防重复变量 ==========
        let finalText = '';
        let processedIndex = 0;
        const sampleRate = 16000;
        const bitRate = 64;

        // ========== 核心：存储MP3的Blob和URL ==========
        let currentMP3Blob = null;
        let currentMP3Url = null;

        // ========== DOM元素 ==========
        const statusText = document.getElementById('statusText');
        const resultText = document.getElementById('resultText');
        const audioSection = document.getElementById('audioSection');
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');

        // ========== iOS音频激活（必须在用户点击事件内） ==========
        function activateIOSAudio() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.value = 0;
            osc.start(0);
            osc.stop(0);
            ctx.close();
        }

        // ========== 语音识别（彻底无重复） ==========
        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('请使用Safari/Chrome/Edge等现代浏览器');
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = function(event) {
                let currentLiveText = '';
                // 只处理本次新增结果
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalText += transcript + '\n';
                        processedIndex = i + 1;
                    } else {
                        currentLiveText += transcript;
                    }
                }
                resultText.textContent = finalText + currentLiveText;
                statusText.textContent = '🎤 正在识别...';
            };

            recognition.onend = function() {
                if (isRecording) {
                    statusText.textContent = '🎙️ 等待继续说话...';
                }
            };

            recognition.onerror = function(event) {
                if (event.error === 'no-speech') {
                    statusText.textContent = '🎙️ 未检测到语音，请继续说话';
                } else if (event.error !== 'aborted') {
                    statusText.textContent = '识别错误: ' + event.error;
                }
            };

            return true;
        }

        // ========== MP3录音核心 ==========
        function initMP3Recorder(stream) {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext({ sampleRate: sampleRate });
            audioInput = audioContext.createMediaStreamSource(stream);
            recorderNode = audioContext.createScriptProcessor(4096, 1, 1);
            mp3Encoder = new lamejs.Mp3Encoder(1, sampleRate, bitRate);

            const mp3Data = [];
            recorderNode.onaudioprocess = function(e) {
                if (!isRecording) return;
                const pcmData = e.inputBuffer.getChannelData(0);
                const int16Data = new Int16Array(pcmData.length);
                for (let i = 0; i < pcmData.length; i++) {
                    int16Data[i] = Math.max(-1, Math.min(1, pcmData[i])) * 32767;
                }
                const mp3Buffer = mp3Encoder.encodeBuffer(int16Data);
                if (mp3Buffer.length > 0) {
                    mp3Data.push(mp3Buffer);
                }
            };

            audioInput.connect(recorderNode);
            recorderNode.connect(audioContext.destination);

            return {
                finish: function() {
                    const endBuffer = mp3Encoder.flush();
                    if (endBuffer.length > 0) {
                        mp3Data.push(endBuffer);
                    }
                    return new Blob(mp3Data, { type: 'audio/mp3' });
                },
                clear: function() {
                    mp3Data.length = 0;
                }
            };
        }

        // ========== 开始录音+识别 ==========
        function startRecording() {
            // 重置状态
            finalText = '';
            processedIndex = 0;
            resultText.textContent = '请说话...';
            audioSection.style.display = 'none';
            saveBtn.disabled = true;
            // 清理之前的音频资源
            if (currentMP3Url) {
                URL.revokeObjectURL(currentMP3Url);
                currentMP3Url = null;
            }
            currentMP3Blob = null;
            audioPlayer.src = '';
            playBtn.textContent = '▶️ 点击播放录音';

            activateIOSAudio();
            if (!initRecognition()) return;

            navigator.mediaDevices.getUserMedia({ 
                audio: {
                    sampleRate: sampleRate,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }
            })
            .then(stream => {
                audioStream = stream;
                const recorder = initMP3Recorder(stream);

                recognition.start();
                isRecording = true;

                statusText.textContent = '🎙️ 正在录音（MP3格式），请说话...';
                startBtn.disabled = true;
                stopBtn.disabled = false;

                window.stopMP3Recording = function() {
                    isRecording = false;
                    if (recognition) {
                        try { recognition.stop(); } catch(e) {}
                    }
                    if (recorderNode) {
                        recorderNode.disconnect();
                        audioInput.disconnect();
                    }
                    if (audioStream) {
                        audioStream.getTracks().forEach(track => track.stop());
                    }
                    if (audioContext) {
                        audioContext.close();
                    }
                    const mp3Blob = recorder.finish();
                    recorder.clear();
                    return mp3Blob;
                };
            })
            .catch(err => {
                statusText.textContent = '麦克风权限被拒绝';
                alert('请在系统设置中允许浏览器访问麦克风');
                startBtn.disabled = false;
                stopBtn.disabled = true;
            });
        }

        // ========== 停止录音 ==========
        function stopRecording() {
            if (!isRecording) return;
            const mp3Blob = window.stopMP3Recording();
            if (!mp3Blob || mp3Blob.size === 0) {
                statusText.textContent = '❌ 未采集到有效音频';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                return;
            }

            // 核心修复1：只存储Blob，不提前设置audio.src
            currentMP3Blob = mp3Blob;
            // 显示播放区域
            audioSection.style.display = 'block';
            saveBtn.disabled = false;

            statusText.textContent = '✅ 录音完成，点击下方按钮播放';
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // ========== 核心修复2：在用户点击播放按钮时，才设置src并播放 ==========
        function playAudio() {
            if (!currentMP3Blob) {
                alert('无录音文件');
                return;
            }

            // iOS核心：在用户点击事件内，激活音频+设置src+播放，一气呵成
            activateIOSAudio();

            // 如果还没创建URL，才创建
            if (!currentMP3Url) {
                currentMP3Url = URL.createObjectURL(currentMP3Blob);
                audioPlayer.src = currentMP3Url;
            }

            // 直接播放
            if (audioPlayer.paused) {
                audioPlayer.play()
                    .then(() => {
                        playBtn.textContent = '⏸️ 点击暂停';
                        statusText.textContent = '🔊 正在播放录音...';
                    })
                    .catch(err => {
                        alert('播放失败：' + err.message + '\n请检查设备音量和静音开关');
                    });
            } else {
                audioPlayer.pause();
                playBtn.textContent = '▶️ 点击播放录音';
                statusText.textContent = '⏸️ 播放已暂停';
            }
        }

        // ========== 原生audio播放结束，同步按钮状态 ==========
        function audioEndedHandler() {
            playBtn.textContent = '▶️ 点击播放录音';
            statusText.textContent = '✅ 播放结束';
        }

        // ========== 保存MP3 ==========
        function saveMP3() {
            if (!currentMP3Blob) {
                alert('无MP3文件可保存');
                return;
            }
            const fileName = `语音录音_${new Date().toLocaleString('zh-CN').replace(/[/:\s]/g, '-')}.mp3`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(currentMP3Blob);
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            statusText.textContent = `✅ MP3文件已保存：${fileName}`;
        }

        // ========== 绑定事件 ==========
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        saveBtn.addEventListener('click', saveMP3);
        // 核心：绑定自定义播放按钮
        playBtn.addEventListener('click', playAudio);
        // 同步原生audio的结束事件
        audioPlayer.addEventListener('ended', audioEndedHandler);
    </script>
</body>
</html>
